<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punch Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Layer 1: Webcam video -->
  <video id="webcam" autoplay playsinline muted></video>

  <!-- Layer 2: Game canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- Layer 3: HUD overlay -->
  <div id="hud">
    <div id="hud-top">
      <div id="score-display">SCORE: <span id="score">0</span></div>
      <div id="timer-display">TIME: <span id="timer">60</span></div>
    </div>
    <div id="combo-display">
      <span id="combo"></span>
    </div>
  </div>

  <div id="test-version"></div>

  <!-- Overlays -->
  <div id="loading-overlay" class="overlay">
    <div class="overlay-content">
      <h1>PUNCH GAME</h1>
      <p id="loading-status">Loading pose detection model...</p>
      <div class="spinner"></div>
    </div>
  </div>

  <div id="ready-overlay" class="overlay hidden">
    <div class="overlay-content">
      <h1>PUNCH GAME</h1>
      <p>Punch red targets, kick blue targets!</p>
      <p class="hint">Press SPACE or punch to start</p>
    </div>
  </div>

  <div id="countdown-overlay" class="overlay hidden">
    <div class="overlay-content">
      <span id="countdown-number" class="countdown-num">3</span>
    </div>
  </div>

  <div id="gameover-overlay" class="overlay hidden">
    <div class="overlay-content">
      <h1>GAME OVER</h1>
      <div class="stats">
        <p>Final Score: <span id="final-score">0</span></p>
        <p>Max Combo: <span id="max-combo">0</span></p>
        <p>Accuracy: <span id="accuracy">0</span>%</p>
      </div>
      <p class="hint">Press R or punch to restart</p>
    </div>
  </div>

  <!-- Hit flash overlay -->
  <div id="hit-flash"></div>
  <!-- Miss flash overlay -->
  <div id="miss-flash"></div>

  <script type="module">
    import { initPose, detectPose, getPoseState } from './pose.js';
    import { Game } from './game.js';
    import { Effects } from './effects.js';
    import { Sound } from './sound.js';

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const TEST_VERSION = 3;

    document.getElementById('test-version').textContent = `TEST v${TEST_VERSION}`;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const sound = new Sound();
    const effects = new Effects(ctx, canvas);
    const game = new Game(canvas, ctx, effects, sound);

    async function startWebcam() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
      });
      video.srcObject = stream;
      await new Promise(resolve => { video.onloadedmetadata = resolve; });
      await video.play();
    }

    async function main() {
      try {
        await startWebcam();
        document.getElementById('loading-status').textContent = 'Loading pose model...';
        await initPose(video);
        game.setState('READY');
      } catch (err) {
        document.getElementById('loading-status').textContent =
          'Error: ' + err.message + '. Please allow camera access and reload.';
        console.error(err);
      }
    }

    let lastTime = 0;
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;

      detectPose(timestamp);
      const poseState = getPoseState();

      game.update(dt, poseState);
      game.draw();

      requestAnimationFrame(gameLoop);
    }

    main().then(() => {
      requestAnimationFrame(gameLoop);
    });
  </script>
</body>
</html>
